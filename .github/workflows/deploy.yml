name: Deploy Wix Headless Site (production)

on:
  workflow_dispatch:
    inputs:
      project_dir:
        description: Path to Wix Headless project root (default `site`). Run after approving a preview.
        required: false
        type: string
        default: "site"
  workflow_call:
    inputs:
      project_dir:
        description: Path to Wix Headless project root
        required: false
        type: string
        default: "site"

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and release to Wix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    outputs:
      release_url: ${{ steps.release.outputs.release_url }}
    env:
      PROJECT_DIR: ${{ inputs.project_dir || 'site' }}
      WIX_CLI_API_KEY: ${{ secrets.WIX_CLI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Authenticate Wix CLI
        env:
          WIX_CLI_API_KEY: ${{ secrets.WIX_CLI_API_KEY }}
        run: bash scripts/verify-wix-auth.sh

      - name: Install project dependencies
        run: bash scripts/npm-install-project.sh "${{ env.PROJECT_DIR }}"

      - name: Build and release
        id: release
        run: bash scripts/run-release-for-ci.sh

      - name: Commit updated run.json
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .wix/run.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No run.json changes"
          else
            git commit -m "Record Wix release URL (run ${{ github.run_id }})"
            git push origin HEAD
          fi

  notify:
    name: Notify deploy outcome
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Notify n8n webhook
        continue-on-error: true
        env:
          N8N_WEBHOOK_URL_TEST: ${{ secrets.N8N_WEBHOOK_URL_TEST }}
          N8N_WEBHOOK_URL_PROD: ${{ secrets.N8N_WEBHOOK_URL_PROD }}
          N8N_WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET }}
          WEBHOOK_EVENT: deploy.completed
          JOB_RESULT: ${{ needs.deploy.result }}
          WORKFLOW_NAME: ${{ github.workflow }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          PROJECT_DIR: ${{ inputs.project_dir || 'site' }}
          RELEASE_URL: ${{ needs.deploy.outputs.release_url }}
        run: bash scripts/notify-webhook.sh

      - name: Write job summary
        env:
          RELEASE_URL: ${{ needs.deploy.outputs.release_url }}
        run: |
          {
            echo "## Wix Headless production release"
            echo ""
            echo "Promotes the built project to the live site (\`wix release\`)."
            echo ""
            if [[ -n "$RELEASE_URL" ]]; then
              echo "**Live URL:** $RELEASE_URL"
            else
              echo "Deploy did not produce a release URL. Check job logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
