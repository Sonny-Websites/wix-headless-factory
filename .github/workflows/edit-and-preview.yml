name: Edit and Preview Wix Headless Site

on:
  workflow_dispatch:
    inputs:
      edit_prompt:
        description: Natural-language description of the changes to make
        required: true
        type: string
      project_dir:
        description: Path to Wix Headless project root
        required: false
        type: string
        default: site

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: edit-${{ github.repository }}
  cancel-in-progress: false

jobs:
  edit-and-preview:
    name: Codex edit → merge → Wix preview
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
    env:
      EDIT_PROMPT: ${{ inputs.edit_prompt }}
      PROJECT_DIR: ${{ inputs.project_dir }}
      WIX_PROJECT_DIR: ${{ inputs.project_dir }}
      CI: "true"
      TRIGGERED_BY: ${{ github.actor }}
      RUN_ID: ${{ github.run_id }}
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      preview_url: ${{ steps.preview.outputs.preview_url }}
      pr_number: ${{ steps.commit_pr.outputs.pr_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Authenticate Wix CLI
        env:
          WIX_CLI_API_KEY: ${{ secrets.WIX_CLI_API_KEY }}
        run: bash scripts/verify-wix-auth.sh

      - name: Install Wix Headless skill
        run: bash scripts/install-wix-headless-skill.sh

      - name: Prepare edit context
        run: bash scripts/prepare-edit-context.sh

      - name: Render Codex edit prompt
        run: |
          node --input-type=module - <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';

          const ctx = JSON.parse(readFileSync('.github/codex/.edit-context.json', 'utf8'));
          let prompt = readFileSync('.github/codex/prompts/edit.md', 'utf8');
          prompt = prompt.replaceAll('{{EDIT_PROMPT}}', ctx.editPrompt);
          writeFileSync('.github/codex/prompts/edit.rendered.md', prompt);
          console.log('Rendered .github/codex/prompts/edit.rendered.md');
          EOF

      - name: Generate Codex config from template
        run: bash scripts/restore-codex-config.sh

      - name: Run Codex site edit
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/edit.rendered.md
          output-file: .github/codex/edit-output.md
          codex-home: .github/codex
          codex-args: '--profile factory'
          sandbox: danger-full-access
          safety-strategy: drop-sudo
          model: gpt-5.3-codex

      - name: Discard Codex home artifacts
        run: bash scripts/discard-codex-home-artifacts.sh

      - name: Stage site edits
        run: bash scripts/stage-site-edits.sh

      - name: Commit staged edits and merge PR
        id: commit_pr
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          EDIT_SUMMARY: "Site edit: ${{ github.run_id }}"
        run: bash scripts/commit-staged-edit-pr.sh

      - name: Sync main after merge
        if: steps.commit_pr.outputs.pr_number != ''
        run: |
          git fetch origin main
          git checkout main
          git pull origin main

      - name: Install project dependencies
        run: bash scripts/npm-install-project.sh "${{ env.PROJECT_DIR }}"

      - name: Build and publish Wix preview
        id: preview
        env:
          WIX_CLI_API_KEY: ${{ secrets.WIX_CLI_API_KEY }}
        run: bash scripts/run-preview-for-ci.sh

      - name: Record preview URL on main
        env:
          GIT_USER_NAME: github-actions[bot]
          GIT_USER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add .wix/run.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No run.json changes to commit"
          else
            git commit -m "Record Wix preview URL (run ${{ github.run_id }})"
            git push origin main
          fi

      - name: Upload edit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: edit-${{ github.run_id }}
          path: |
            .github/codex/edit-output.md
            .wix/run.json
          if-no-files-found: ignore

  notify:
    name: Summarize edit outcome
    runs-on: ubuntu-latest
    needs: edit-and-preview
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Notify n8n webhook
        continue-on-error: true
        env:
          N8N_WEBHOOK_URL_TEST: ${{ secrets.N8N_WEBHOOK_URL_TEST }}
          N8N_WEBHOOK_URL_PROD: ${{ secrets.N8N_WEBHOOK_URL_PROD }}
          N8N_WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET }}
          WEBHOOK_EVENT: edit.completed
          JOB_RESULT: ${{ needs.edit-and-preview.result }}
          WORKFLOW_NAME: ${{ github.workflow }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          EDIT_PROMPT: ${{ inputs.edit_prompt }}
          PROJECT_DIR: ${{ inputs.project_dir }}
          PREVIEW_URL: ${{ needs.edit-and-preview.outputs.preview_url }}
          FINAL_MESSAGE: ${{ needs.edit-and-preview.outputs.final_message }}
        run: bash scripts/notify-webhook.sh

      - name: Write job summary
        env:
          FINAL_MESSAGE: ${{ needs.edit-and-preview.outputs.final_message }}
          PREVIEW_URL: ${{ needs.edit-and-preview.outputs.preview_url }}
        run: |
          USER_SUMMARY="$(bash scripts/render-user-summary.sh 2>/dev/null || true)"
          {
            echo "## Wix Headless edit + preview"
            echo ""
            echo "| Input | Value |"
            echo "| --- | --- |"
            echo "| Run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |"
            if [[ -n "$USER_SUMMARY" ]]; then
              echo ""
              echo "### What changed"
              echo "$USER_SUMMARY"
            fi
            if [[ -n "$PREVIEW_URL" ]]; then
              echo ""
              echo "**Preview:** $PREVIEW_URL"
              echo ""
              echo "When approved, run **Deploy Wix Headless Site (production)** to publish live."
            else
              echo ""
              echo "No preview URL was produced. Check the edit job logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
