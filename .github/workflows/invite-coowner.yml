name: Invite Wix Site Co-owner

on:
  workflow_dispatch:
    inputs:
      coowner_email:
        description: Email address to invite as site co-owner
        required: true
        type: string
      project_dir:
        description: Wix project path (for run.json updates; default `site`)
        required: false
        type: string
        default: "site"
  workflow_call:
    inputs:
      coowner_email:
        description: Email address to invite as site co-owner
        required: true
        type: string
      project_dir:
        description: Wix project path (for run.json updates)
        required: false
        type: string
        default: "site"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: invite-coowner-${{ github.repository }}
  cancel-in-progress: false

jobs:
  invite:
    name: Send co-owner collaboration invite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      PROJECT_DIR: ${{ inputs.project_dir || 'site' }}
      COOWNER_EMAIL: ${{ inputs.coowner_email }}
      WIX_CLI_API_KEY: ${{ secrets.WIX_CLI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Authenticate Wix CLI
        env:
          WIX_CLI_API_KEY: ${{ secrets.WIX_CLI_API_KEY }}
        run: bash scripts/verify-wix-auth.sh

      - name: Invite site co-owner
        run: bash scripts/invite-site-coowner.sh

      - name: Commit updated run.json
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .wix/run.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No run.json changes"
          else
            git commit -m "Record Wix co-owner invite (run ${{ github.run_id }})"
            git push origin HEAD
          fi

  notify:
    name: Notify invite outcome
    runs-on: ubuntu-latest
    needs: invite
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Notify n8n webhook
        continue-on-error: true
        env:
          N8N_WEBHOOK_URL_TEST: ${{ secrets.N8N_WEBHOOK_URL_TEST }}
          N8N_WEBHOOK_URL_PROD: ${{ secrets.N8N_WEBHOOK_URL_PROD }}
          N8N_WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET }}
          WEBHOOK_EVENT: invite.completed
          JOB_RESULT: ${{ needs.invite.result }}
          WORKFLOW_NAME: ${{ github.workflow }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          PROJECT_DIR: ${{ inputs.project_dir || 'site' }}
        run: bash scripts/notify-webhook.sh

      - name: Write job summary
        run: |
          {
            echo "## Wix site co-owner invite"
            echo ""
            echo "| Input | Value |"
            echo "| --- | --- |"
            echo "| Email | ${{ inputs.coowner_email }} |"
            echo "| Run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |"
            echo ""
            if [[ "${{ needs.invite.result }}" == "success" ]]; then
              echo "Co-owner invite sent. Check \`.wix/run.json\` → \`outcome.coOwnerInvite\` for details."
            else
              echo "Invite failed. Check job logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
